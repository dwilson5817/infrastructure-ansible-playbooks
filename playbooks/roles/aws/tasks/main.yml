---

- name: Install unzip package
  ansible.builtin.apt:
    name: unzip
    state: present
    update_cache: yes
  become: yes

- name: Download the AWS CLI bundle
  ansible.builtin.get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
    dest: /tmp/awscliv2.zip
  register: aws_cli_download_bundle

- name: Unarchive the AWS CLI bundle
  ansible.builtin.unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp
    remote_src: yes
    creates: /tmp/aws/install

- name: Install or update the AWS CLI
  ansible.builtin.command: ./aws/install --update
  args:
    chdir: /tmp
    creates: /usr/local/bin/aws
  become: yes

- name: Remove AWS CLI bundle
  ansible.builtin.file:
    path: /tmp/awscliv2.zip
    state: absent

- name: Recursively unzipped AWS CLI bundle directory
  ansible.builtin.file:
    path: /tmp/aws
    state: absent
