---

- name: Configure MariaDB network and connection settings
  ansible.builtin.copy:
    content: |
      [mysqld]
      skip-networking=0
      skip-bind-address

      [mariadb]
      max_connections=1000
    dest: /etc/mysql/mariadb.conf.d/51-server-ansible.cnf
  register: copy_config

- name: Ensure MariaDB service is enabled and not masked
  ansible.builtin.systemd_service:
    name: mariadb
    state: started
    enabled: true

- name: Restart MariaDB service if configuration changed
  ansible.builtin.service:
    name: mariadb
    state: restarted
  when: copy_config.changed

- name: Install Python MySQL database connector
  ansible.builtin.package:
    name: python3-mysqldb
    state: present

- name: Create MariaDB users with database-specific privileges
  community.mysql.mysql_user:
    name: "{{ item.name }}"
    host: "{{ item.host }}"
    password: "{{ mariadb_passwords[item.name] }}"
    priv: "`{{ item.name }}\\_%`.*:ALL"
    state: present
  loop: "{{ mariadb_users }}"

- name: Create specified MariaDB databases
  community.mysql.mysql_db:
    name: "{{ mariadb_dbs }}"
    state: present
