---

- name: Configure Python environment
  include_tasks: python.yml

- name: Setup APT package repositories
  include_tasks: apt.yml

- name: Configure ACME SSL certificates
  include_tasks: acme.yml

- name: Install and configure NGINX
  ansible.builtin.import_role:
    name: nginxinc.nginx
  vars:
    nginx_install_from: os_repository
    nginx_service_modify: true
    nginx_service_clean: false
    nginx_service_custom: true
    nginx_service_custom_file: nginx.override.conf

- name: Remove NGINX default virtual host
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Configure NGINX reverse proxy
  ansible.builtin.import_role:
    name: nginxinc.nginx_config
  vars:
    nginx_config_http_template_enable: true
    nginx_config_http_template:
      - deployment_location: /etc/nginx/sites-enabled/proxmox.conf
        backup: false
        config:
          upstreams:
            - name: proxmox
              servers:
                - address: london.dylanw.net
          servers:
            - core:
                listen:
                  - port: 80
                    default_server: true
              rewrite:
                rewrites:
                  - regex: ^(.*)
                    replacement: https://$host$1
                    flag: permanent
            - core:
                listen:
                  - port: 443
                    ssl: true
                server_name: _
              ssl:
                certificate: "/etc/pve/local/pveproxy-ssl.pem"
                certificate_key: "/etc/pve/local/pveproxy-ssl.key"
              proxy:
                redirect: false
              locations:
                - location: /
                  core:
                    client_max_body_size: 0
                    send_timeout: 3600s
                  proxy:
                    set_header:
                      - field: Upgrade
                        value: $http_upgrade
                      - field: Connection
                        value: upgrade
                    pass: https://localhost:8006
                    buffering: false
                    connect_timeout: 3600s
                    read_timeout: 3600s
                    send_timeout: 3600s

- name: Apply NGINX configuration changes
  ansible.builtin.systemd:
    name: nginx.service
    state: reloaded

- name: Setup VMs with temporary API token
  block:
  - name: Generate temporary Proxmox API token
    ansible.builtin.command: "pvesh create /access/users/{{ proxmox_token_user }}/token/{{ proxmox_token_id }} --privsep false --output-format json-pretty"
    register: proxmox_api_token_result

  - name: Store API token value
    ansible.builtin.set_fact:
      proxmox_token_secret: "{{ (proxmox_api_token_result.stdout | from_json).value }}"

  - name: Setup DNS resolvers and search domain
    include_tasks: dns.yml

  - name: Configure storage volumes and directories
    include_tasks: storage.yml

  - name: Create VM images directory
    ansible.builtin.file:
      path: /var/lib/vz/images/0
      state: directory

  - name: Download Debian cloud image
    ansible.builtin.get_url:
      url: "https://cloud.debian.org/images/cloud/{{ template_debian_codename }}/{{ template_version }}/debian-{{ template_debian_version }}-generic-amd64-{{ template_version }}.qcow2"
      dest: "/var/lib/vz/images/0/debian-{{ template_debian_version }}-generic-amd64-{{ template_version }}.qcow2"
      checksum: "sha512:{{ template_checksum }}"

  - name: Create and configure virtual machines
    include_tasks: vms.yml
    loop: "{{ proxmox_vms | dict2items(key_name='name', value_name='props') }}"
    vars:
      proxmox_ssh_keys: 'ssh-rsa  dylan@desktop01'

  - name: Configure backup jobs
    include_tasks: backups.yml
    loop: "{{ proxmox_backup_jobs | dict2items }}"
    loop_control:
      extended: true

  always:
    - name: Delete temporary token
      ansible.builtin.command: "pvesh delete /access/users/{{ proxmox_token_user }}/token/{{ proxmox_token_id }}"

- name: Configure TLS certificates
  include_tasks: network.yml

- name: Refresh inventory to ensure new instances exist in inventory
  ansible.builtin.meta: refresh_inventory
