- name: "Create SSL certificates directory structure for {{ item.domain }}"
  ansible.builtin.file:
    path: "{{ acme_dir_base }}/{{ acme_dir_names.certs_dir }}/{{ item.domain }}"
    state: directory
    owner: root
    group: certs
    mode: u=rwx,g=rx

- name: "Create SSL private key for {{ item.domain }} CSR signing"
  community.crypto.openssl_privatekey:
    path: "{{ acme_dir_base }}/{{ acme_dir_names.keys_dir }}/{{ item.domain }}.pem"
    owner: root
    group: certs
    mode: u=rw,g=r

- name: "Create SSL certificate signing request (CSR) for {{ item.domain }}"
  community.crypto.openssl_csr:
    path: "{{ acme_dir_base }}/{{ acme_dir_names.csrs_dir }}/{{ item.domain }}.csr"
    privatekey_path: "{{ acme_dir_base }}/{{ acme_dir_names.keys_dir }}/{{ item.domain }}.pem"
    subject_alt_name: "{{ item.props.alternative_domains | default([]) | map('regex_replace', '^', 'DNS:') | list }}"
    common_name: "{{ item.domain }}"

- name: "Execute DNS challenge validation for {{ item.domain }} with cleanup"
  block:
  - name: "Initialize ACME DNS challenge for {{ item.domain }}"
    community.crypto.acme_certificate:
      account_key: "{{ acme_dir_base }}/{{ acme_dir_names.account_dir }}/account.pem"
      account_email: "{{ acme_contact }}"
      acme_directory: "{{ acme_directory }}"
      acme_version: 2
      terms_agreed: true
      csr: "{{ acme_dir_base }}/{{ acme_dir_names.csrs_dir }}/{{ item.domain }}.csr"
      cert: "{{ acme_dir_base }}/{{ acme_dir_names.certs_dir }}/{{ item.domain }}/cert.pem"
      fullchain_dest: "{{ acme_dir_base }}/{{ acme_dir_names.certs_dir }}/{{ item.domain }}/fullchain.pem"
      challenge: dns-01
      remaining_days: 60
    register: dns_challenge

  - name: "Configure DNS TXT records for ACME challenge validation of {{ item.domain }}"
    ansible.builtin.include_tasks: dns_challenge.yml
    loop: "{{ dns_challenge.challenge_data_dns | dict2items }}"
    loop_control:
      loop_var: challenge
    when: dns_challenge is changed

  - name: "Complete ACME challenge validation and obtain SSL certificate for {{ item.domain }}"
    community.crypto.acme_certificate:
      account_key: "{{ acme_dir_base }}/{{ acme_dir_names.account_dir }}/account.pem"
      account_email: "{{ acme_contact }}"
      acme_directory: "{{ acme_directory }}"
      acme_version: 2
      terms_agreed: true
      csr: "{{ acme_dir_base }}/{{ acme_dir_names.csrs_dir }}/{{ item.domain }}.csr"
      cert: "{{ acme_dir_base }}/{{ acme_dir_names.certs_dir }}/{{ item.domain }}/cert.pem"
      fullchain_dest: "{{ acme_dir_base }}/{{ acme_dir_names.certs_dir }}/{{ item.domain }}/fullchain.pem"
      challenge: dns-01
      remaining_days: 60
      data: "{{ dns_challenge }}"
    when: dns_challenge is changed
    register: result
    until: result is not failed
    notify: acme_certs_changed

  - name: Set proper ownership and permissions for SSL certificate files
    ansible.builtin.file:
      path: "{{ file }}"
      owner: root
      group: certs
      mode: '640'
    loop:
      - "{{ acme_dir_base }}/{{ acme_dir_names.certs_dir }}/{{ item.domain }}/cert.pem"
      - "{{ acme_dir_base }}/{{ acme_dir_names.certs_dir }}/{{ item.domain }}/fullchain.pem"
    loop_control:
      loop_var: file

  always:
  - name: "Clean up ACME challenge DNS TXT records for {{ item.domain }}"
    community.general.cloudflare_dns:
      zone: "{{ item.props.cloudflare_zone }}"
      record: "{{ challenge.key }}"
      type: TXT
      value: "{{ ' '.join(challenge.value) }}"
      api_token: "{{ cloudflare_api_token }}"
      state: absent
    loop: "{{ dns_challenge.challenge_data_dns | dict2items }}"
    loop_control:
      loop_var: challenge
    when: dns_challenge is changed