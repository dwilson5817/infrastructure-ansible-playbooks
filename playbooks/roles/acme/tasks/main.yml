---

- name: Ensure group certs exists
  ansible.builtin.group:
    name: certs
    state: present

- name: Create required directories for ACME
  ansible.builtin.file:
    path: "{{ acme_dir_base }}/{{ item.value }}"
    state: directory
    owner: root
    group: certs
    mode: u=rwx,g=rx
  loop: "{{ acme_dir_names | dict2items }}"

- name: Install Python OpenSSL library which is required by community.crypto
  ansible.builtin.apt:
    pkg:
      - python3-openssl
      - python3-dnspython
    state: present

- name: Generate an OpenSSL private key for ACME account
  community.crypto.openssl_privatekey:
    path: "{{ acme_dir_base }}/{{ acme_dir_names.account_dir }}/account.pem"
    owner: root
    group: certs

- name: Issue ACME certificate(s)
  ansible.builtin.include_tasks: certs.yml
  loop: "{{ ( acme_certs | default({}) ) | dict2items(key_name='domain', value_name='props') }}"
