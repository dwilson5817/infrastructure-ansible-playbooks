---
- name: Ensure update-motd directory exists (Debian)
  ansible.builtin.file:
    path: /etc/update-motd.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install dynamic MOTD script (our banner)
  ansible.builtin.copy:
    dest: "{{ motd_script_path | default('/etc/update-motd.d/50-system-info') }}"
    owner: root
    group: root
    mode: "0755"
    content: !unsafe |
      #!/usr/bin/env bash
      set -euo pipefail

      # Force UTF-8 locale so width calculations for unicode art (θΫ· θΫΪ) are consistent at login.
      export LC_ALL=C.UTF-8
      export LANG=C.UTF-8

      if [[ -z "${NO_COLOR:-}" ]] && [[ -z "${MOTD_NO_COLOR:-}" ]]; then
        BOLD=$'\033[1m'
        DIM=$'\033[2m'
        CYAN=$'\033[36m'
        GREY=$'\033[90m'
        RESET=$'\033[0m'
        COLOR_ENABLED=1
      else
        BOLD=""; DIM=""; CYAN=""; GREY=""; RESET=""
        COLOR_ENABLED=0
      fi

      ART=$'     θΫ·θΫ·θΫ·θΫ·θΫ·            θΫ·θΫ·θΫ·θΫ·                                                               θΫ·θΫ·θΫ·θΫ·θΫ·   \n    θΫΪθΫΪθΫ·θΫ·θΫ·            θΫΪθΫΪθΫ·θΫ·θΫ·                                                              θΫΪθΫΪθΫ·θΫ·θΫ·    \n  θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·  θΫ·θΫ·θΫ·θΫ·θΫ· θΫ·θΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·   θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·   θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·   θΫ·θΫ·θΫ·θΫ·θΫ· θΫ·θΫ·θΫ· θΫ·θΫ·θΫ·θΫ·θΫ·    θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·    θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·  θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·  \n θΫ·θΫ·θΫ·θΫΪθΫΪθΫ·θΫ·θΫ· θΫΪθΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·  θΫΪθΫ·θΫ·θΫ·  θΫΪθΫΪθΫΪθΫΪθΫΪθΫ·θΫ·θΫ· θΫΪθΫΪθΫ·θΫ·θΫ·θΫΪθΫΪθΫ·θΫ·θΫ· θΫΪθΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·θΫΪθΫΪθΫ·θΫ·θΫ·    θΫΪθΫΪθΫ·θΫ·θΫ·θΫΪθΫΪθΫ·θΫ·θΫ·  θΫ·θΫ·θΫ·θΫΪθΫΪθΫ·θΫ·θΫ·θΫΪθΫΪθΫΪθΫ·θΫ·θΫ·θΫΪ   \nθΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·  θΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·  θΫΪθΫ·θΫ·θΫ·   θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·  θΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·  θΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·     θΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·   θΫΪθΫ·θΫ·θΫ·    \nθΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·  θΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·  θΫΪθΫ·θΫ·θΫ·  θΫ·θΫ·θΫ·θΫΪθΫΪθΫ·θΫ·θΫ·  θΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·  θΫΪθΫΪθΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·      θΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·θΫΪθΫΪθΫΪ    θΫΪθΫ·θΫ·θΫ· θΫ·θΫ·θΫ·\nθΫΪθΫΪθΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ· θΫΪθΫΪθΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·  θΫ·θΫ·θΫ·θΫ·θΫ·θΫΪθΫΪθΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ·θΫ· θΫ·θΫ·θΫ·θΫ· θΫ·θΫ·θΫ·θΫ·θΫ·  θΫΪθΫΪθΫ·θΫ·θΫ·θΫ·θΫΪθΫ·θΫ·θΫ·θΫ·    θΫ·θΫ· θΫ·θΫ·θΫ·θΫ· θΫ·θΫ·θΫ·θΫ·θΫ·θΫΪθΫΪθΫ·θΫ·θΫ·θΫ·θΫ·θΫ·   θΫΪθΫΪθΫ·θΫ·θΫ·θΫ·θΫ· \n θΫΪθΫΪθΫΪθΫΪθΫΪθΫΪθΫΪθΫΪ   θΫΪθΫΪθΫΪθΫΪθΫΪθΫ·θΫ·θΫ· θΫΪθΫΪθΫΪθΫΪθΫΪ  θΫΪθΫΪθΫΪθΫΪθΫΪθΫΪθΫΪθΫΪ θΫΪθΫΪθΫΪθΫΪ θΫΪθΫΪθΫΪθΫΪθΫΪ    θΫΪθΫΪθΫΪθΫΪ θΫΪθΫΪθΫΪθΫΪ    θΫΪθΫΪ θΫΪθΫΪθΫΪθΫΪ θΫΪθΫΪθΫΪθΫΪθΫΪ  θΫΪθΫΪθΫΪθΫΪθΫΪθΫΪ     θΫΪθΫΪθΫΪθΫΪθΫΪ  \n            θΫ·θΫ·θΫ· θΫΪθΫ·θΫ·θΫ·                                                                             \n           θΫΪθΫΪθΫ·θΫ·θΫ·θΫ·θΫ·θΫ·                                                                              \n            θΫΪθΫΪθΫΪθΫΪθΫΪθΫΪ                                                                               '

      repeat_char() {
        local ch="$1" n="$2"
        printf "%*s" "${n}" "" | tr " " "${ch}"
      }

      art_width() {
        local max=0 line
        while IFS= read -r line; do
          ((${#line} > max)) && max=${#line}
        done <<< "${ART}"
        printf "%d" "${max}"
      }

      clamp_text() {
        local text="$1" width="$2"
        local len="${#text}"
        if (( len <= width )); then
          printf "%s" "${text}"
          return 0
        fi
        if (( width <= 3 )); then
          printf "%s" "${text:0:width}"
          return 0
        fi
        printf "%s..." "${text:0:width-3}"
      }

      spaced_text() {
        local input="$1"
        local out="" ch i
        for (( i=0; i<${#input}; i++ )); do
          ch="${input:i:1}"
          if [[ "${ch}" == " " ]]; then
            out+="     "
          else
            out+="${ch}  "
          fi
        done
        out="${out%"  "}"
        printf "%s" "${out}"
      }

      print_centered_line() {
        local text="$1" width="$2" color_prefix="${3:-}"
        local clipped len left right
        clipped="$(clamp_text "${text}" "${width}")"
        len="${#clipped}"
        left=$(( (width - len) / 2 ))
        right=$(( width - len - left ))

        if [[ "${COLOR_ENABLED}" -eq 1 ]] && [[ -n "${color_prefix}" ]]; then
          printf "%s%s%s%s%s\n" "${color_prefix}" "$(repeat_char " " "${left}")" "${clipped}" "$(repeat_char " " "${right}")" "${RESET}"
        else
          printf "%s%s%s\n" "$(repeat_char " " "${left}")" "${clipped}" "$(repeat_char " " "${right}")"
        fi
      }

      primary_ipv4() {
        local ip=""
        if command -v ip >/dev/null 2>&1; then
          ip="$(ip -4 route get 1.1.1.1 2>/dev/null | awk '{for(i=1;i<=NF;i++) if($i=="src"){print $(i+1); exit}}')"
          [[ -n "${ip}" ]] || ip="$(ip -4 route get 8.8.8.8 2>/dev/null | awk '{for(i=1;i<=NF;i++) if($i=="src"){print $(i+1); exit}}')"
        fi
        if [[ -z "${ip}" ]] && command -v hostname >/dev/null 2>&1; then
          ip="$(hostname -I 2>/dev/null | awk '{print $1}' || true)"
        fi
        [[ -n "${ip}" ]] || ip="(no IPv4 found)"
        printf "%s" "${ip}"
      }

      primary_ipv6() {
        local ip6=""
        if command -v ip >/dev/null 2>&1; then
          ip6="$(ip -6 route get 2606:4700:4700::1111 2>/dev/null | awk '{for(i=1;i<=NF;i++) if($i=="src"){print $(i+1); exit}}')"
          [[ -n "${ip6}" ]] || ip6="$(ip -6 route get 2001:4860:4860::8888 2>/dev/null | awk '{for(i=1;i<=NF;i++) if($i=="src"){print $(i+1); exit}}')"
        fi
        [[ -n "${ip6}" ]] || ip6="(no IPv6 found)"
        printf "%s" "${ip6}"
      }

      # Centered KV block:
      # - labels are left-padded (right aligned)
      # - labels bold (cyan)
      # - colon grey
      # - values plain (white/default)
      print_kv_block_left_padded_labels() {
        local width="$1"
        shift 1
        local pairs=("$@")

        local i label value label_w=0
        for ((i=0; i<${#pairs[@]}; i+=2)); do
          label="${pairs[i]}"
          ((${#label} > label_w)) && label_w=${#label}
        done

        local max_val=0
        for ((i=0; i<${#pairs[@]}; i+=2)); do
          value="${pairs[i+1]}"
          ((${#value} > max_val)) && max_val=${#value}
        done

        local block_w=$(( label_w + 2 + max_val ))
        (( block_w > width )) && block_w="${width}"

        local margin=$(( (width - block_w) / 2 ))
        (( margin < 0 )) && margin=0
        local pad
        pad="$(repeat_char " " "${margin}")"

        local value_max=$(( block_w - (label_w + 2) ))
        (( value_max < 0 )) && value_max=0

        for ((i=0; i<${#pairs[@]}; i+=2)); do
          label="${pairs[i]}"
          value="${pairs[i+1]}"
          value="$(clamp_text "${value}" "${value_max}")"

          if [[ "${COLOR_ENABLED}" -eq 1 ]]; then
            printf "%s%s%*s%s%s:%s %s\n" \
              "${pad}" \
              "${BOLD}${CYAN}" \
              "${label_w}" "${label}" \
              "${RESET}" \
              "${GREY}" \
              "${RESET}" \
              "${value}"
          else
            printf "%s%*s: %s\n" "${pad}" "${label_w}" "${label}" "${value}"
          fi
        done
      }

      WIDTH="$(art_width)"
      [[ "${WIDTH}" -ge 1 ]] || WIDTH=80

      printf "\n"
      WELCOME_SPACED="$(spaced_text "WELCOME ON")"
      print_centered_line "${WELCOME_SPACED}" "${WIDTH}" "${BOLD}${CYAN}"
      printf "\n"

      if [[ "${COLOR_ENABLED}" -eq 1 ]]; then
        printf "%s%s%s\n" "${CYAN}" "${ART}" "${RESET}"
      else
        printf "%s\n" "${ART}"
      fi

      HOST="$(hostname -f 2>/dev/null || hostname)"
      KERNEL="$(uname -r)"
      UPTIME="$(uptime -p 2>/dev/null || true)"
      LOAD="$(cut -d ' ' -f1-3 /proc/loadavg 2>/dev/null || true)"

      if command -v free >/dev/null 2>&1; then
        MEM="$(free -h | awk '/^Mem:/ {print $3 " used / " $2 " total"}')"
      else
        MEM="(free not available)"
      fi

      if command -v df >/dev/null 2>&1; then
        ROOTFS="$(df -h / 2>/dev/null | awk 'NR==2 {print $3 " used / " $2 " total (" $5 ")"}')"
      else
        ROOTFS="(df not available)"
      fi

      MAIN_IP4="$(primary_ipv4)"
      MAIN_IP6="$(primary_ipv6)"

      SEP="$(repeat_char "=" "${WIDTH}")"
      printf "%s%s%s\n" "${DIM}" "${SEP}" "${RESET}"

      print_kv_block_left_padded_labels "${WIDTH}" \
        "Host" "${HOST}" \
        "Kernel" "${KERNEL}" \
        "Uptime" "${UPTIME}" \
        "Load (1/5/15)" "${LOAD}" \
        "Memory" "${MEM}" \
        "Disk (/)" "${ROOTFS}" \
        "IPv4" "${MAIN_IP4}" \
        "IPv6" "${MAIN_IP6}"

      printf "%s%s%s\n" "${DIM}" "${SEP}" "${RESET}"

- name: Disable all other update-motd scripts (so only our banner runs)
  ansible.builtin.find:
    paths: /etc/update-motd.d
    file_type: file
  register: update_motd_scripts

- name: Remove execute bit from all update-motd scripts except ours and sudo warning
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "0644"
  loop: "{{ update_motd_scripts.files }}"
  when:
    - item.path != (motd_script_path | default('/etc/update-motd.d/50-system-info'))

- name: Ensure SSHD does not print extra messages
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?\\s*{{ item.key }}\\s+"
    line: "{{ item.key }} {{ item.value }}"
    create: true
  loop:
    - { key: "Banner", value: "none" }
    - { key: "PrintMotd", value: "no" }
    - { key: "PrintLastLog", value: "no" }
    - { key: "UsePAM", value: "yes" }
  notify: Reload sshd

- name: Remove all pam_motd lines from /etc/pam.d/sshd (avoid duplicates and /etc/motd)
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    regexp: "^\\s*session\\s+optional\\s+pam_motd\\.so\\b.*$"
    state: absent
  notify: Reload sshd

- name: Add single pam_motd line for dynamic MOTD only
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    insertafter: "^# Print the message of the day upon successful login\\."
    line: "session    optional     pam_motd.so  motd=/run/motd.dynamic"
  notify: Reload sshd
