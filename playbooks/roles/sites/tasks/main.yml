---

- name: Create "docker" group
  ansible.builtin.group:
    name: docker
    state: present

- name: Add the ansible user to the "docker" group
  ansible.builtin.user:
    name: ansible
    groups: docker
    append: yes
  become: yes

- name: Create directory for sites
  ansible.builtin.file:
    path: /srv/www
    state: directory
    owner: ansible
    group: ansible
  become: yes

- name: Create directory for dylanw.net sites
  ansible.builtin.file:
    path: /srv/www/dylanw.net
    state: directory

- name: Create directory for MinersRealm sites
  ansible.builtin.file:
    path: /srv/www/minersrealm.net
    state: directory

- name: Configure Pocket ID
  ansible.builtin.include_tasks: pocket_id.yml

- name: Configure Pterodactyl
  ansible.builtin.include_tasks: pterodactyl.yml

- name: Configure NamelessMC
  ansible.builtin.include_tasks: nameless.yml
  vars:
    nameless_assets:
      - "{{ nameless_core_version | replace('.', '') }}.zip"
      - "Nameless-Lithium-{{ nameless_lithium_version }}.zip"
      - "Nameless-Tebex-{{ nameless_tebex_version }}.zip"
