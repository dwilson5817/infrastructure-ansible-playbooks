---

- hosts: monitor
  roles:
  - role: dns
  - role: prometheus.prometheus.blackbox_exporter
    vars:
      blackbox_exporter_web_listen_address: "localhost:9115"
      blackbox_exporter_configuration_modules:
        http_2xx:
          prober: http
          timeout: 5s
          http:
            method: GET
            valid_status_codes: [ 200 ]
  - role: prometheus.prometheus.prometheus
    vars:
      ansible_host_key_checking: false
      prometheus_web_listen_address: "localhost:9090"
      prometheus_web_external_url: "https://{{ prometheus_hostname }}"
      prometheus_alertmanager_config:
        - static_configs:
            - targets:
                - "localhost:9093"
      prometheus_targets:
        node:
          - targets: "{{ groups['proxmox_all_qemu'] | map('extract', hostvars, 'ansible_host') | product([':9101']) | map('join') | list }}"
        mysqld:
          - targets: "{{ groups['sql'] | map('extract', hostvars, 'ansible_host') | product([':9102']) | map('join') | list }}"
      prometheus_web_config:
        tls_server_config: {}
        http_server_config: {}
        basic_auth_users: "{{ prometheus_basic_auth_users }}"
      prometheus_scrape_configs:
        - job_name: "prometheus"
          metrics_path: "{{ prometheus_metrics_path }}"
          scheme: https
          basic_auth:
            username: 'prometheus'
            password: "{{ prometheus_basic_auth_users.prometheus }}"
          static_configs:
            - targets:
                - "{{ prometheus_hostname }}"
        - job_name: node
          metrics_path: '/metrics'
          scheme: https
          basic_auth:
            username: 'prometheus'
            password: "{{ node_exporter_basic_auth_users.prometheus }}"
          file_sd_configs:
            - files:
                - "{{ prometheus_config_dir }}/file_sd/node.yml"
          relabel_configs:
            - source_labels: [ __address__ ]
              regex: "([^:]+):\\d+"
              target_label: instance
        - job_name: mysqld
          metrics_path: '/metrics'
          scheme: https
          basic_auth:
            username: 'prometheus'
            password: "{{ mysqld_exporter_basic_auth_users.prometheus }}"
          file_sd_configs:
            - files:
                - "{{ prometheus_config_dir }}/file_sd/mysqld.yml"
          relabel_configs:
            - source_labels: [ __address__ ]
              regex: "([^:]+):\\d+"
              target_label: instance
        - job_name: 'blackbox'
          metrics_path: /probe
          params:
            module: [ http_2xx ]  # Look for a HTTP 200 response.
          static_configs:
            - targets:
                - https://www.dylanw.dev
                - https://blog.dylanw.dev
                - https://resume.dylanw.dev
                - https://check.dylanw.dev
                - https://portal.dylanw.dev
                - https://market.dylanw.dev
                - https://www.minersrealm.net
                - https://www.antrimtiling.com
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: localhost:9115  # The blackbox exporter's real hostname:port.
      prometheus_alert_rules:
        # -------------------------
        # Availability / exporters
        # -------------------------
        - alert: NodeExporterDown
          expr: 'up{job="node"} == 0'
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Node exporter down{% endraw %}'
            description: '{% raw %}{{ $labels.instance }} (job {{ $labels.job }}) has been down for more than 5 minutes.{% endraw %}'

        - alert: MySQLExporterDown
          expr: 'up{job="mysqld"} == 0'
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] MySQL exporter down{% endraw %}'
            description: '{% raw %}{{ $labels.instance }} (job {{ $labels.job }}) has been down for more than 5 minutes.{% endraw %}'

        # -------------------------
        # Node: operational hygiene
        # -------------------------
        - alert: NodeRebootRequired
          expr: 'node_reboot_required{job="node"} > 0'
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Reboot required{% endraw %}'
            description: '{% raw %}{{ $labels.instance }} requires a reboot.{% endraw %}'

        # -------------------------
        # Node: CPU / memory / swap
        # -------------------------
        - alert: NodeCpuUtilizationHigh
          expr: 'avg by (instance) (rate(node_cpu_seconds_total{job="node",mode!="idle"}[5m])) > 0.90'
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] High CPU utilization{% endraw %}'
            description: '{% raw %}CPU utilization has been >90% for 15 minutes on {{ $labels.instance }}.{% endraw %}'

        - alert: NodeCpuUtilizationHigh
          expr: 'avg by (instance) (rate(node_cpu_seconds_total{job="node",mode!="idle"}[5m])) > 0.95'
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Very high CPU utilization{% endraw %}'
            description: '{% raw %}CPU utilization has been >95% for 15 minutes on {{ $labels.instance }}.{% endraw %}'

        - alert: NodeMemoryAvailableLow
          expr: '(node_memory_MemAvailable_bytes{job="node"} / node_memory_MemTotal_bytes{job="node"}) < 0.10'
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Low available memory{% endraw %}'
            description: '{% raw %}MemAvailable has been <10% for 15 minutes on {{ $labels.instance }}.{% endraw %}'

        - alert: NodeMemoryAvailableLow
          expr: '(node_memory_MemAvailable_bytes{job="node"} / node_memory_MemTotal_bytes{job="node"}) < 0.05'
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Very low available memory{% endraw %}'
            description: '{% raw %}MemAvailable has been <5% for 15 minutes on {{ $labels.instance }}.{% endraw %}'

        - alert: NodeSwapFreeLow
          expr: '(node_memory_SwapTotal_bytes{job="node"} > 0) and ((node_memory_SwapFree_bytes{job="node"} / node_memory_SwapTotal_bytes{job="node"}) < 0.20)'
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Low swap free space{% endraw %}'
            description: '{% raw %}Swap free space has been <20% for 15 minutes on {{ $labels.instance }}. This often indicates memory pressure.{% endraw %}'

        - alert: NodeSwapFreeLow
          expr: '(node_memory_SwapTotal_bytes{job="node"} > 0) and ((node_memory_SwapFree_bytes{job="node"} / node_memory_SwapTotal_bytes{job="node"}) < 0.10)'
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Very low swap free space{% endraw %}'
            description: '{% raw %}Swap free space has been <10% for 15 minutes on {{ $labels.instance }}. This often indicates severe memory pressure.{% endraw %}'

        # -------------------------
        # Node: storage (I/O + capacity)
        # -------------------------
        - alert: NodeDiskInputOutputTimeHigh
          expr: 'rate(node_disk_io_time_seconds_total{job="node"}[5m]) > 0.50'
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] High disk input/output time{% endraw %}'
            description: '{% raw %}Disk input/output time has been high for 15 minutes on {{ $labels.instance }}. This can indicate storage contention.{% endraw %}'

        - alert: NodeDiskInputOutputTimeHigh
          expr: 'rate(node_disk_io_time_seconds_total{job="node"}[5m]) > 0.80'
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Very high disk input/output time{% endraw %}'
            description: '{% raw %}Disk input/output time has been very high for 15 minutes on {{ $labels.instance }}. This can indicate severe storage contention or a failing disk.{% endraw %}'

        - alert: NodeFilesystemSpaceFillingUpSoon
          expr: "(\n  node_filesystem_avail_bytes{job=\"node\",fstype!=\"\"} / node_filesystem_size_bytes{job=\"node\",fstype!=\"\"} * 100 < 40\nand\n  predict_linear(node_filesystem_avail_bytes{job=\"node\",fstype!=\"\"}[6h], 24*60*60) < 0\nand\n  node_filesystem_readonly{job=\"node\",fstype!=\"\"} == 0\n)\n"
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Filesystem space filling up (24h prediction){% endraw %}'
            description: '{% raw %}Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left and is filling up.{% endraw %}'

        - alert: NodeFilesystemSpaceFillingUpSoon
          expr: "(\n  node_filesystem_avail_bytes{job=\"node\",fstype!=\"\"} / node_filesystem_size_bytes{job=\"node\",fstype!=\"\"} * 100 < 20\nand\n  predict_linear(node_filesystem_avail_bytes{job=\"node\",fstype!=\"\"}[6h], 4*60*60) < 0\nand\n  node_filesystem_readonly{job=\"node\",fstype!=\"\"} == 0\n)\n"
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Filesystem space filling up (4h prediction){% endraw %}'
            description: '{% raw %}Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left and is filling up fast.{% endraw %}'

        - alert: NodeFilesystemSpaceLow
          expr: "(\n  node_filesystem_avail_bytes{job=\"node\",fstype!=\"\"} / node_filesystem_size_bytes{job=\"node\",fstype!=\"\"} * 100 < 5\nand\n  node_filesystem_readonly{job=\"node\",fstype!=\"\"} == 0\n)\n"
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Filesystem space low{% endraw %}'
            description: '{% raw %}Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left.{% endraw %}'

        - alert: NodeFilesystemSpaceLow
          expr: "(\n  node_filesystem_avail_bytes{job=\"node\",fstype!=\"\"} / node_filesystem_size_bytes{job=\"node\",fstype!=\"\"} * 100 < 3\nand\n  node_filesystem_readonly{job=\"node\",fstype!=\"\"} == 0\n)\n"
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Filesystem space critically low{% endraw %}'
            description: '{% raw %}Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left.{% endraw %}'

        - alert: NodeFilesystemInodesFillingUpSoon
          expr: "(\n  node_filesystem_files_free{job=\"node\",fstype!=\"\"} / node_filesystem_files{job=\"node\",fstype!=\"\"} * 100 < 40\nand\n  predict_linear(node_filesystem_files_free{job=\"node\",fstype!=\"\"}[6h], 24*60*60) < 0\nand\n  node_filesystem_readonly{job=\"node\",fstype!=\"\"} == 0\n)\n"
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Filesystem inodes filling up (24h prediction){% endraw %}'
            description: '{% raw %}Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available inodes left and is filling up.{% endraw %}'

        - alert: NodeFilesystemInodesFillingUpSoon
          expr: "(\n  node_filesystem_files_free{job=\"node\",fstype!=\"\"} / node_filesystem_files{job=\"node\",fstype!=\"\"} * 100 < 20\nand\n  predict_linear(node_filesystem_files_free{job=\"node\",fstype!=\"\"}[6h], 4*60*60) < 0\nand\n  node_filesystem_readonly{job=\"node\",fstype!=\"\"} == 0\n)\n"
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Filesystem inodes filling up (4h prediction){% endraw %}'
            description: '{% raw %}Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available inodes left and is filling up fast.{% endraw %}'

        - alert: NodeFilesystemInodesLow
          expr: "(\n  node_filesystem_files_free{job=\"node\",fstype!=\"\"} / node_filesystem_files{job=\"node\",fstype!=\"\"} * 100 < 5\nand\n  node_filesystem_readonly{job=\"node\",fstype!=\"\"} == 0\n)\n"
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Filesystem inodes low{% endraw %}'
            description: '{% raw %}Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available inodes left.{% endraw %}'

        - alert: NodeFilesystemInodesLow
          expr: "(\n  node_filesystem_files_free{job=\"node\",fstype!=\"\"} / node_filesystem_files{job=\"node\",fstype!=\"\"} * 100 < 3\nand\n  node_filesystem_readonly{job=\"node\",fstype!=\"\"} == 0\n)\n"
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Filesystem inodes critically low{% endraw %}'
            description: '{% raw %}Filesystem on {{ $labels.device }} at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available inodes left.{% endraw %}'

        # -------------------------
        # Node: networking
        # -------------------------
        - alert: NodeNetworkReceiveErrorsHigh
          expr: "increase(node_network_receive_errs_total{job=\"node\"}[2m]) > 10\n"
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Network receive errors high{% endraw %}'
            description: '{% raw %}{{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf "%.0f" $value }} receive errors in the last two minutes.{% endraw %}'

        - alert: NodeNetworkReceiveErrorsHigh
          expr: "increase(node_network_receive_errs_total{job=\"node\"}[2m]) > 100\n"
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Network receive errors critically high{% endraw %}'
            description: '{% raw %}{{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf "%.0f" $value }} receive errors in the last two minutes.{% endraw %}'

        - alert: NodeNetworkTransmitErrorsHigh
          expr: "increase(node_network_transmit_errs_total{job=\"node\"}[2m]) > 10\n"
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Network transmit errors high{% endraw %}'
            description: '{% raw %}{{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf "%.0f" $value }} transmit errors in the last two minutes.{% endraw %}'

        - alert: NodeNetworkTransmitErrorsHigh
          expr: "increase(node_network_transmit_errs_total{job=\"node\"}[2m]) > 100\n"
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Network transmit errors critically high{% endraw %}'
            description: '{% raw %}{{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf "%.0f" $value }} transmit errors in the last two minutes.{% endraw %}'

        # -------------------------
        # Node: conntrack
        # -------------------------
        - alert: NodeConntrackEntriesUsageHigh
          expr: '(node_nf_conntrack_entries{job="node"} / node_nf_conntrack_entries_limit{job="node"}) > 0.75'
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Conntrack entries usage high{% endraw %}'
            description: '{% raw %}{{ $value | humanizePercentage }} of conntrack entries are used on {{ $labels.instance }}.{% endraw %}'

        - alert: NodeConntrackEntriesUsageHigh
          expr: '(node_nf_conntrack_entries{job="node"} / node_nf_conntrack_entries_limit{job="node"}) > 0.90'
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Conntrack entries usage critically high{% endraw %}'
            description: '{% raw %}{{ $value | humanizePercentage }} of conntrack entries are used on {{ $labels.instance }}.{% endraw %}'

        # -------------------------
        # Node: time synchronization
        # -------------------------
        - alert: NodeClockSkewDetected
          expr: "(\n  node_timex_offset_seconds{job=\"node\"} > 0.05\nand\n  deriv(node_timex_offset_seconds{job=\"node\"}[5m]) >= 0\n)\nor\n(\n  node_timex_offset_seconds{job=\"node\"} < -0.05\nand\n  deriv(node_timex_offset_seconds{job=\"node\"}[5m]) <= 0\n)\n"
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Clock skew detected{% endraw %}'
            message: '{% raw %}Clock on {{ $labels.instance }} is out of sync by more than 300s. Ensure NTP is configured correctly on this host.{% endraw %}'

        - alert: NodeClockNotSynchronizing
          expr: "min_over_time(node_timex_sync_status{job=\"node\"}[5m]) == 0\n"
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] Clock not synchronizing{% endraw %}'
            message: '{% raw %}Clock on {{ $labels.instance }} is not synchronising. Ensure NTP is configured on this host.{% endraw %}'

        # -------------------------
        # MySQL / MariaDB
        # -------------------------
        - alert: MySQLServerDown
          expr: 'mysql_up{job="mysqld"} == 0'
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] MySQL server down{% endraw %}'
            description: '{% raw %}mysqld_exporter has been unable to connect to MySQL for 5 minutes on {{ $labels.instance }}.{% endraw %}'

        - alert: MySQLConnectionsHigh
          expr: '(mysql_global_status_threads_connected{job="mysqld"} / mysql_global_variables_max_connections{job="mysqld"}) > 0.80'
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] MySQL connections high{% endraw %}'
            description: '{% raw %}Threads_connected has been >80% of max_connections for 10 minutes on {{ $labels.instance }}.{% endraw %}'

        - alert: MySQLConnectionsHigh
          expr: '(mysql_global_status_threads_connected{job="mysqld"} / mysql_global_variables_max_connections{job="mysqld"}) > 0.90'
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: '{% raw %}[{{ $labels.instance }}] MySQL connections critically high{% endraw %}'
            description: '{% raw %}Threads_connected has been >90% of max_connections for 10 minutes on {{ $labels.instance }}.{% endraw %}'
  - role: prometheus.prometheus.alertmanager
    vars:
      alertmanager_version: latest
      alertmanager_receivers:
        - name: gitlab
          webhook_configs:
            - url: "{{ vault_prometheus_webhooks_gitlab['url'] }}"
              send_resolved: true
              http_config:
                authorization:
                  type: Bearer
                  credentials: "{{ vault_prometheus_webhooks_gitlab['auth_key'] }}"
      alertmanager_route:
        group_by:
          - instance
          - alertname
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: gitlab
      alertmanager_inhibit_rules:
        - source_matchers:
            - severity="critical"
          target_matchers:
            - severity="warning"
          equal: [ 'instance' ]
  - role: grafana.grafana.grafana
    vars:
      grafana_ini:
        instance_name: "{{ grafana_hostname }}"
        root_url: "https://{{ grafana_hostname }}"
        server:
          http_addr: 127.0.0.1
        security:
          admin_user: "{{ grafana_admin_username }}"
          admin_password: "{{ grafana_admin_password }}"
      grafana_datasources:
        - name: prometheus
          type: prometheus
          access: proxy
          url: "https://{{ prometheus_hostname }}"
          basicAuth: true
          basicAuthUser: "grafana"
          secureJsonData:
            basicAuthPassword: "{{ prometheus_basic_auth_users.grafana }}"
      grafana_dashboards:
        - dashboard_id: 1860
          revision_id: 31
          datasource: prometheus
          folder: 'Exporters'
        - dashboard_id: 3662
          revision_id: 2
          datasource: prometheus
          folder: 'Prometheus'
        - dashboard_id: 7362
          revision_id: 5
          datasource: prometheus
          folder: 'Exporters'
        - dashboard_id: 13659
          revision_id: 1
          datasource: prometheus
          folder: 'Exporters'
  - role: nginxinc.nginx
    become: yes
  - role: acme
    become: yes
    vars:
      acme_certs:
        "{{ prometheus_hostname }}":
          cloudflare_zone: "{{ prometheus_zone }}"
        "{{ grafana_hostname }}":
          cloudflare_zone: "{{ grafana_zone }}"
  - role: nginxinc.nginx_config
    become: yes
    vars:
      nginx_config_http_template_enable: true
      nginx_config_http_template:
        - deployment_location: /etc/nginx/conf.d/monitoring_dylanw_net.conf
          backup: false
          config:
            map:
              mappings:
                - string: $http_upgrade
                  variable: $connection_upgrade
                  content:
                    - value: default
                      new_value: upgrade
                    - value: "''"
                      new_value: close
            upstreams:
              - name: grafana
                servers:
                  - address: localhost:3000
            servers:
              - core:
                  listen:
                    - port: 443
                      ssl: true
                    - port: 80
                  server_name: "{{ grafana_hostname }}"
                  root: /usr/share/nginx/html
                  index: index.html index.htm
                ssl:
                  certificate: "/etc/letsencrypt/certs/{{ grafana_hostname }}/fullchain.pem"
                  certificate_key: "/etc/letsencrypt/keys/{{ grafana_hostname }}.pem"
                  session_cache:
                    shared:
                      name: le_nginx_SSL
                      size: 10m
                  session_timeout: 1440m
                  session_tickets: false
                  protocols:
                    - TLSv1.2
                    - TLSv1.3
                  prefer_server_ciphers: false
                  ciphers:
                    - ECDHE-ECDSA-AES128-GCM-SHA256
                    - ECDHE-RSA-AES128-GCM-SHA256
                    - ECDHE-ECDSA-AES256-GCM-SHA384
                    - ECDHE-RSA-AES256-GCM-SHA384
                    - ECDHE-ECDSA-CHACHA20-POLY1305
                    - ECDHE-RSA-CHACHA20-POLY1305
                    - DHE-RSA-AES128-GCM-SHA256
                    - DHE-RSA-AES256-GCM-SHA384
                locations:
                  - location: /
                    proxy:
                      set_header:
                        - field: Host
                          value: $http_host
                      pass: http://grafana
                  - location: /api/live/
                    proxy:
                      http_version: '1.1'
                      set_header:
                        - field: Upgrade
                          value: $http_upgrade
                        - field: Connection
                          value: $connection_upgrade
                        - field: Host
                          value: $http_host
                      pass: http://grafana
                custom_directives:
                  - >
                    if ($scheme != "https") {
                        return 301 https://$host$request_uri;
                    }
        - template_file: http/default.conf.j2
          deployment_location: /etc/nginx/conf.d/prometheus_dylanw_net.conf
          backup: false
          config:
            upstreams:
              - name: prometheus
                servers:
                  - address: localhost:9090
            servers:
              - core:
                  listen:
                    - port: 443
                      ssl: true
                    - port: 80
                  server_name: "{{ prometheus_hostname }}"
                  root: /usr/share/nginx/html
                  index: index.html index.htm
                ssl:
                  certificate: "/etc/letsencrypt/certs/{{ prometheus_hostname }}/fullchain.pem"
                  certificate_key: "/etc/letsencrypt/keys/{{ prometheus_hostname }}.pem"
                  session_cache:
                    shared:
                      name: le_nginx_SSL
                      size: 10m
                  session_timeout: 1440m
                  session_tickets: false
                  protocols:
                    - TLSv1.2
                    - TLSv1.3
                  prefer_server_ciphers: false
                  ciphers:
                    - ECDHE-ECDSA-AES128-GCM-SHA256
                    - ECDHE-RSA-AES128-GCM-SHA256
                    - ECDHE-ECDSA-AES256-GCM-SHA384
                    - ECDHE-RSA-AES256-GCM-SHA384
                    - ECDHE-ECDSA-CHACHA20-POLY1305
                    - ECDHE-RSA-CHACHA20-POLY1305
                    - DHE-RSA-AES128-GCM-SHA256
                    - DHE-RSA-AES256-GCM-SHA384
                locations:
                  - location: /
                    proxy:
                      set_header:
                        - field: Host
                          value: $http_host
                      pass: http://prometheus
                custom_directives:
                  - >
                    if ($scheme != "https") {
                        return 301 https://$host$request_uri;
                    }
  handlers:
    - name: Restart nginx after certificates changed
      become: yes
      ansible.builtin.service:
        name: nginx
        state: reloaded
      listen: acme_certs_changed
