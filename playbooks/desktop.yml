---

- hosts: desktop
  roles:
  - role: geerlingguy.docker
    become: yes
  post_tasks:
    - name: Install HashiCorp GPG key
      ansible.builtin.get_url:
        url: https://apt.releases.hashicorp.com/gpg
        dest: /usr/share/keyrings/hashicorp-archive-keyring.asc
        mode: '0644'
      become: yes

    - name: Add HashiCorp apt repository
      ansible.builtin.apt_repository:
        filename: hashicorp
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/hashicorp-archive-keyring.asc] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
      become: yes

    - name: Install system packages and development dependencies
      ansible.builtin.package:
        name:
          - zsh
          - rsync
          - mariadb-client
          - vault
          - zip
          - unzip

          # For asdf Python
          - build-essential
          - libssl-dev
          - zlib1g-dev
          - libbz2-dev
          - libreadline-dev
          - libsqlite3-dev
          - curl
          - git
          - libncursesw5-dev
          - xz-utils
          - tk-dev
          - libxml2-dev
          - libxmlsec1-dev
          - libffi-dev
          - liblzma-dev

          # Ansible
          - sshpass

          # https://www.jetbrains.com/help/pycharm/2025.1/set-up-GPG-commit-signing.html
          - gnupg2
          - gnupg-agent
          - pinentry-gnome3
        state: present
        update_cache: yes
      become: yes

    - name: Create user account for dylan
      ansible.builtin.user:
        name: dylan
        comment: Dylan Wilson
        shell: /usr/bin/zsh
      become: yes

    - name: Configure SSH authorized keys for dylan
      ansible.posix.authorized_key:
        user: dylan
        state: present
        key: "{{ item }}"
      become: yes
      loop:
        - ssh-rsa  dylan@desktop01
        - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGR054Pp32qm3CQOFPfaYf5DftOQDnLG0vc/YKubEra/ dwils@desktop01

    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add dylan user to docker group
      ansible.builtin.user:
        name: dylan
        groups: docker
        append: yes
      become: yes

    - name: Download the AWS CLI bundle
      ansible.builtin.get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
      register: aws_cli_download_bundle

    - name: Unarchive the AWS CLI bundle
      ansible.builtin.unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: yes
        creates: /tmp/aws
      when: aws_cli_download_bundle.changed
      register: aws_cli_unarchive_installer

    - name: Install or update the AWS CLI
      ansible.builtin.command: ./aws/install --update
      args:
        chdir: /tmp
        creates: /usr/local/bin/aws
      become: yes
