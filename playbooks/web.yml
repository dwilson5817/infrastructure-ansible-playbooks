---

- hosts: web
  pre_tasks:
    - name: Install system packages and development dependencies
      ansible.builtin.package:
        name:
          - zip
          - unzip
          - python3-boto3
        state: present
        update_cache: yes
      become: yes
    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "/var/backups/www_minersrealm_net"
        state: directory
        owner: root
        group: root
        mode: '0700'
      become: yes
  roles:
    - role: dns
    - role: acme
      become: yes
      vars:
        acme_certs: "{{ web_certs }}"
    - role: geerlingguy.docker
      become: yes
    - role: nginxinc.nginx
      become: yes
    - role: sites
    - role: backups
      become: yes
    - role: nginxinc.nginx_config
      become: yes
      vars:
        nginx_config_http_template_enable: true
        nginx_config_http_template:
          - deployment_location: /etc/nginx/conf.d/minersrealm_net.conf
            backup: false
            config:
              core:
                server_tokens: no
              servers:
                - core:
                    listen:
                      - port: 80
                      - port: 80
                        address: '[::]'
                      - port: 443
                        address: '[::]'
                        ssl: true
                      - port: 443
                        ssl: true
                    server_name: minersrealm.net www.minersrealm.net
                  ssl:
                    certificate: "/etc/letsencrypt/certs/minersrealm.net/fullchain.pem"
                    certificate_key: "/etc/letsencrypt/keys/minersrealm.net.pem"
                    session_cache:
                      shared:
                        name: SSL
                        size: 10m
                    protocols:
                      - TLSv1.2
                      - TLSv1.3
                    ciphers:
                      - ECDHE-ECDSA-AES128-GCM-SHA256
                      - ECDHE-RSA-AES128-GCM-SHA256
                      - ECDHE-ECDSA-AES256-GCM-SHA384
                      - ECDHE-RSA-AES256-GCM-SHA384
                      - ECDHE-ECDSA-CHACHA20-POLY1305
                      - ECDHE-RSA-CHACHA20-POLY1305
                      - DHE-RSA-AES128-GCM-SHA256
                      - DHE-RSA-AES256-GCM-SHA384
                    prefer_server_ciphers: yes
                  locations:
                    - location: /
                      core:
                        client_max_body_size: 50m
                      proxy:
                        pass: http://127.0.0.1:8101/
                        redirect: no
                        proxy_buffering: no
                        request_buffering: no
                        set_header:
                          - field: Host
                            value: $host
                          - field: X-Forwarded-For
                            value: $proxy_add_x_forwarded_for
                          - field: X-Real-IP
                            value: $remote_addr
                          - field: X-Forwarded-Proto
                            value: $scheme
                  custom_directives:
                    - >
                      if ($scheme != "https") {
                          return 301 https://$host$request_uri;
                      }
                - core:
                    listen:
                      - port: 80
                      - port: 80
                        address: '[::]'
                      - port: 443
                        address: '[::]'
                        ssl: true
                      - port: 443
                        ssl: true
                    server_name: panel.minersrealm.net
                  ssl:
                    certificate: "/etc/letsencrypt/certs/minersrealm.net/fullchain.pem"
                    certificate_key: "/etc/letsencrypt/keys/minersrealm.net.pem"
                    session_cache:
                      shared:
                        name: SSL
                        size: 10m
                    protocols:
                      - TLSv1.2
                      - TLSv1.3
                    ciphers:
                      - ECDHE-ECDSA-AES128-GCM-SHA256
                      - ECDHE-RSA-AES128-GCM-SHA256
                      - ECDHE-ECDSA-AES256-GCM-SHA384
                      - ECDHE-RSA-AES256-GCM-SHA384
                      - ECDHE-ECDSA-CHACHA20-POLY1305
                      - ECDHE-RSA-CHACHA20-POLY1305
                      - DHE-RSA-AES128-GCM-SHA256
                      - DHE-RSA-AES256-GCM-SHA384
                    prefer_server_ciphers: yes
                  locations:
                    - location: /
                      core:
                        client_max_body_size: 50m
                      proxy:
                        pass: http://127.0.0.1:8100/
                        redirect: no
                        proxy_buffering: no
                        request_buffering: no
                        set_header:
                           - field: Host
                             value: $host
                           - field: X-Forwarded-For
                             value: $proxy_add_x_forwarded_for
                           - field: X-Real-IP
                             value: $remote_addr
                           - field: X-Forwarded-Proto
                             value: $scheme
                  custom_directives:
                    - >
                      if ($scheme != "https") {
                          return 301 https://$host$request_uri;
                      }
                - core:
                    listen:
                      - port: 80
                      - port: 80
                        address: '[::]'
                      - port: 443
                        address: '[::]'
                        ssl: true
                      - port: 443
                        ssl: true
                    server_name: auth.dylanw.net
                  ssl:
                    certificate: "/etc/letsencrypt/certs/dylanw.net/fullchain.pem"
                    certificate_key: "/etc/letsencrypt/keys/dylanw.net.pem"
                    session_cache:
                      shared:
                        name: SSL
                        size: 10m
                    protocols:
                      - TLSv1.2
                      - TLSv1.3
                    ciphers:
                      - ECDHE-ECDSA-AES128-GCM-SHA256
                      - ECDHE-RSA-AES128-GCM-SHA256
                      - ECDHE-ECDSA-AES256-GCM-SHA384
                      - ECDHE-RSA-AES256-GCM-SHA384
                      - ECDHE-ECDSA-CHACHA20-POLY1305
                      - ECDHE-RSA-CHACHA20-POLY1305
                      - DHE-RSA-AES128-GCM-SHA256
                      - DHE-RSA-AES256-GCM-SHA384
                    prefer_server_ciphers: yes
                  locations:
                    - location: /
                      core:
                        client_max_body_size: 50m
                      proxy:
                        pass: http://127.0.0.1:1411/
                        redirect: no
                        proxy_buffering: no
                        request_buffering: no
                        set_header:
                          - field: Host
                            value: $host
                          - field: X-Forwarded-For
                            value: $proxy_add_x_forwarded_for
                          - field: X-Real-IP
                            value: $remote_addr
                          - field: X-Forwarded-Proto
                            value: $scheme
                  custom_directives:
                    - >
                      if ($scheme != "https") {
                          return 301 https://$host$request_uri;
                      }
  handlers:
    - name: Restart nginx after certificates changed
      become: yes
      ansible.builtin.service:
        name: nginx
        state: reloaded
      listen: acme_certs_changed
