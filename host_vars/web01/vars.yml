---

vault_mariadb_passwords: "{{ lookup('community.hashi_vault.vault_kv2_get', 'sql/mariadb/passwords')['secret'] }}"
vault_pterodactyl: "{{ lookup('community.hashi_vault.vault_kv2_get', 'web/pterodactyl')['secret'] }}"
vault_nameless_email: "{{ lookup('community.hashi_vault.vault_kv2_get', 'web/nameless/email')['secret'] }}"

dns_records:
  - zone: dylanw.net
    record: auth.dylanw.net
  - zone: minersrealm.net
    record: minersrealm.net
  - zone: minersrealm.net
    record: www.minersrealm.net
  - zone: minersrealm.net
    record: panel.minersrealm.net

web_certs:
  dylanw.net:
    cloudflare_zone: dylanw.net
    alternative_domains:
    - auth.dylanw.net
    - www.dylanw.net
  minersrealm.net:
    cloudflare_zone: minersrealm.net
    alternative_domains:
    - panel.minersrealm.net
    - www.minersrealm.net

nameless_core_version: 2.2.4
nameless_lithium_version: 1.33
nameless_tebex_version: 1.4.0

nameless_config:
  db:
    host: sql.dylanw.net
    port: 3306
    user: miners
    password: "{{ vault_mariadb_passwords['miners'] }}"
    name: miners_website
  email: "{{ vault_nameless_email }}"

pterodactyl_env: "{{ vault_pterodactyl }}"
