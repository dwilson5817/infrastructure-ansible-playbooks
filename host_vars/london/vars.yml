---

vault_proxmox: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/proxmox-credentials')['secret'] }}"

# Secrets from Vault
ansible_ssh_user: "{{ vault_proxmox['ssh_user'] }}"
ansible_ssh_pass: "{{ vault_proxmox['ssh_password'] }}"

proxmox_host: london

template_version: 20250530-2128
template_checksum: 00fc1e3c46ae8b418aaa67cab9efcf72b3826847881bac04cc06ab0eeb3f513d58c45c1f2896e71591cc297052a7bc864d35c2808948c49ed2836abba50e1f3a
debian_version: 12

nfs_mounts:
- server: ftpback-rbx3-346.ovh.net
  export: "/export/ftpbackup/ns3209869.ip-198-244-202.eu"

backup_jobs:
  daily_backups:
    all: true
    prune_backups: keep-last=3
    storage: ftpback-rbx3-346.ovh.net
    schedule: 02:00
    compress: zstd
    comment: Daily backups
    exclude:
     - 101
     - 109
     - 110

