  small:
    cores: 1
    memory: 2048
    disk_size: 50
  medium:
    cores: 2
    memory: 4096
    disk_size: 100
  large:
    cores: 4
    memory: 8192
    disk_size: 150
  extra_large:
    cores: 8
    memory: 16384
    disk_size: 200

