---

vault_grafana: "{{ lookup('community.hashi_vault.vault_kv2_get', 'monitor/grafana', engine_mount_point='secrets/infrastructure/ansible-playbooks')['secret'] }}"
vault_prometheus_users: "{{ lookup('community.hashi_vault.vault_kv2_get', 'monitor/prometheus/users', engine_mount_point='secrets/infrastructure/ansible-playbooks')['secret'] }}"
vault_prometheus_webhooks_gitlab: "{{ lookup('community.hashi_vault.vault_kv2_get', 'monitor/prometheus/webhooks/gitlab', engine_mount_point='secrets/infrastructure/ansible-playbooks')['secret'] }}"

prometheus_zone: "dylanw.net"
prometheus_hostname: "prometheus.dylanw.net"

grafana_zone: "dylanw.net"
grafana_hostname: "monitoring.dylanw.net"

prometheus_basic_auth_users: "{{ vault_prometheus_users }}"

grafana_pocket_id_oidc_application_id: "{{ vault_grafana['pocket_id_oidc_application_id'] }}"
grafana_pocket_id_oidc_secret: "{{ vault_grafana['pocket_id_oidc_secret'] }}"

dns_records:
  - zone: "{{ prometheus_zone }}"
    record: "{{ prometheus_hostname }}"
    type: CNAME
    value: "{{ ansible_host }}"
  - zone: "{{ grafana_zone }}"
    record: "{{ grafana_hostname }}"
    type: CNAME
    value: "{{ ansible_host }}"
