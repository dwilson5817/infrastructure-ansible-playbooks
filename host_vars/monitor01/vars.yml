---

vault_prometheus_users: "{{ lookup('community.hashi_vault.vault_kv2_get', 'monitor/prometheus/users')['secret'] }}"
vault_prometheus_webhooks_gitlab: "{{ lookup('community.hashi_vault.vault_kv2_get', 'monitor/prometheus/webhooks/gitlab')['secret'] }}"
vault_pocket_id_clients_grafana: "{{ lookup('community.hashi_vault.vault_kv2_get', 'pocket-id/clients/grafana')['secret'] }}"

prometheus_zone: "dylanw.net"
prometheus_hostname: "prometheus.dylanw.net"

grafana_zone: "dylanw.net"
grafana_hostname: "monitoring.dylanw.net"

prometheus_basic_auth_users: "{{ vault_prometheus_users }}"

grafana_generic_oauth_client_id: "{{ vault_pocket_id_clients_grafana['client_id'] }}"
grafana_generic_oauth_client_secret: "{{ vault_pocket_id_clients_grafana['client_secret'] }}"

dns_records:
  - zone: "{{ prometheus_zone }}"
    record: "{{ prometheus_hostname }}"
    type: CNAME
    value: "{{ ansible_host }}"
  - zone: "{{ grafana_zone }}"
    record: "{{ grafana_hostname }}"
    type: CNAME
    value: "{{ ansible_host }}"
